name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Lint GAS files
        run: npm run lint

      - name: Validate appsscript.json
        run: node -e "JSON.parse(require('fs').readFileSync('appsscript.json', 'utf8')); console.log('appsscript.json is valid');"
